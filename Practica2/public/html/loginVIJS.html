<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="../css/formStyles.css">
</head>
<body>

<h2>Inicio de sesión</h2>

<form id="loginForm">

    <label for="correo">Usuario (correo):</label>
    <input type="email" id="correo" name="correo"
           placeholder="correo@ejemplo.com" required>
    <span id="error-correo"></span>

    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password"
           placeholder="********" required>
    <span id="error-password"></span>

    <div class="btnContainer">            
        <button class="submit" type="submit">Enviar</button>
        <button class="reset" type="reset">Limpiar</button>
        <button type="button" onclick="window.location.href='/registro'">
            Crear cuenta
        </button>

        <button type="button" onclick="window.location.href='/recuperar'">
            Recuperar contraseña
        </button>
    </div>

</form>


<div id="modalError" class="modal">
    <div class="modal-contenido">
        <span id="cerrarModal">&times;</span>
        <p id="mensajeError"></p>
    </div>
</div>



<pre id="resultado"></pre>


<script src="../js/loginValidate.js"></script>

</body>
</html>
