<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario con validación</title>
    <link rel="stylesheet" href="../css/formStyles.css" />
</head>
<body>

<h2>Formulario de registro</h2>

<form id="miFormulario">

    <!-- Nombre -->
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre"
           pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
           required>
    <span id="error-nombre"></span>

    <!-- Contraseña -->
    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password" required>
    <span id="error-password"></span>

    <!-- Confirmación -->
    <label for="confirmPassword">Confirmar contraseña:</label>
    <input type="password" id="confirmPassword" required>
    <span id="error-confirmPassword"></span>

    <!-- Pregunta -->
    <label for="pregunta">Pregunta de recuperación:</label>
    <input type="text" id="pregunta" name="pregunta" required>
    <span id="error-pregunta"></span>

    <!-- Respuesta -->
    <label for="respuesta">Respuesta:</label>
    <input type="text" id="respuesta" name="respuesta" required>
    <span id="error-respuesta"></span>

    <!-- Correo -->
    <label for="correo">Correo:</label>
    <input type="email" id="correo" name="correo" required>
    <span id="error-correo"></span>

    <div class="btnContainer">
        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>
        <button type="button" onclick="window.location.href='/login'">
            Ya tengo una cuenta
    </button>
    </div>

</form>


<pre id="resultado"></pre>

<script src="/js/validateFormB.js"></script>

</body>
</html>
